<!DOCTYPE html>
<html lang="ko">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','맑은 고딕',sans-serif;background:#f0f2f5;color:#2c3e50;font-size:14px;line-height:1.5;overflow-y:scroll}
a{color:#2e86c1;text-decoration:none}

.header{background:linear-gradient(135deg,#1a5276,#2e86c1);color:#fff;padding:16px 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
.header .sub{font-size:12px;opacity:.8;margin-top:2px}
.header-row{display:flex;justify-content:space-between;align-items:center}
.btn-print{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:.2s}
.btn-print:hover{background:rgba(255,255,255,.35)}

.search-wrap{background:#fff;padding:16px 24px;position:sticky;top:68px;z-index:99;box-shadow:0 1px 4px rgba(0,0,0,.08);border-bottom:1px solid #e0e0e0}
.search-box{position:relative;max-width:700px}
.search-box input{width:100%;padding:12px 16px 12px 42px;border:2px solid #d5d8dc;border-radius:10px;font-size:16px;outline:none;transition:.2s}
.search-box input:focus{border-color:#2e86c1;box-shadow:0 0 0 3px rgba(46,134,193,.15)}
.search-box input::placeholder{color:#aab;font-size:14px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:#95a5a6;pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:20px;color:#95a5a6;cursor:pointer;display:none;padding:4px}
.search-clear:hover{color:#e74c3c}
.search-meta{display:flex;align-items:center;gap:16px;margin-top:10px;flex-wrap:wrap}
.result-count{font-size:13px;color:#7f8c8d;font-weight:600}
.result-count span{color:#2e86c1;font-weight:700}

.filters{display:flex;gap:6px;flex-wrap:wrap}
.filters button{padding:6px 14px;border:1px solid #d5d8dc;background:#fff;border-radius:20px;font-size:12.5px;cursor:pointer;transition:.2s;white-space:nowrap;color:#555}
.filters button:hover{border-color:#2e86c1;color:#2e86c1}
.filters button.active{background:#2e86c1;color:#fff;border-color:#2e86c1}
.filters .cnt{font-size:11px;opacity:.7;margin-left:2px}

.main{max-width:1200px;margin:0 auto;padding:20px 24px 60px}

.dept-section{margin-bottom:24px}
.dept-header{background:linear-gradient(135deg,#1a5276,#2471a3);color:#fff;padding:12px 18px;border-radius:10px 10px 0 0;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:border-radius .2s}
.dept-header:hover{filter:brightness(1.1)}
.dept-header .hanja{font-size:13px;opacity:.7;font-weight:400}
.dept-header .toggle{margin-left:auto;font-size:12px;opacity:.7;transition:transform .2s}
.dept-header.collapsed{border-radius:10px}
.dept-header.collapsed .toggle{transform:rotate(-90deg)}
.dept-body{}
.dept-body.collapsed{display:none}
.dept-note{background:#eaf2f8;padding:10px 18px;font-size:12.5px;color:#1a5276;border-left:3px solid #2e86c1}

.cat-card{background:#fff;border:1px solid #e8e8e8;margin-bottom:2px}
.cat-card:last-child{border-radius:0 0 10px 10px;margin-bottom:0}
.cat-title{padding:10px 18px;background:#f7f9fb;font-weight:700;font-size:13.5px;color:#2c3e50;border-bottom:1px solid #eee;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.cat-title:hover{background:#eef3f8}
.cat-title .toggle{font-size:11px;color:#95a5a6;transition:transform .2s}
.cat-title.collapsed .toggle{transform:rotate(-90deg)}
.cat-body{}
.cat-body.collapsed{display:none}
.subcat-title{padding:8px 18px 8px 30px;background:#fafbfc;font-size:12.5px;font-weight:600;color:#5d6d7e;border-bottom:1px solid #f0f0f0}

.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{background:#f8f9fa;padding:8px 12px;text-align:center;font-size:12px;font-weight:700;color:#5d6d7e;border-bottom:2px solid #dee2e6;white-space:nowrap}
th:first-child{text-align:left;min-width:280px}
th:nth-child(2){min-width:70px}
td{padding:7px 12px;border-bottom:1px solid #f2f2f2;text-align:center;font-size:13px}
td:first-child{text-align:left;font-weight:500;color:#2c3e50}
td:nth-child(2){font-family:'Consolas','Courier New',monospace;color:#7f8c8d;font-size:12px}
tr:hover{background:#f0f7ff}
tr:last-child td{border-bottom:none}

.val{font-weight:700;min-width:36px;display:inline-block}
.val-mild{color:#27ae60}
.val-mod{color:#e67e22}
.val-sev{color:#e74c3c}
.val-end{color:#2e86c1}
.val-work{color:#8e44ad}
.val-na{color:#bdc3c7;font-weight:400}

.sites{margin-top:3px}
.site-tag{display:inline-block;background:#eaf2f8;color:#2471a3;padding:1px 6px;border-radius:3px;font-size:11px;margin:1px 2px}

mark{background:#fff3cd;padding:0 1px;border-radius:2px}

.empty-state{text-align:center;padding:60px 20px;color:#aab}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}

.unit-badge{font-size:10px;color:#fff;background:#95a5a6;padding:1px 5px;border-radius:3px;margin-left:4px;vertical-align:middle;font-weight:400}

@media print{
  .header,.search-wrap,.btn-print,.filters{display:none!important}
  .main{padding:0;max-width:100%}
  .dept-header{background:#1a5276!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .cat-card{break-inside:avoid;page-break-inside:avoid}
  .dept-body.collapsed,.cat-body.collapsed{display:block!important}
  .toggle{display:none!important}
  body{font-size:11px;background:#fff}
  th,td{padding:4px 6px}
  .print-header{display:block!important;text-align:center;padding:20px 0 10px;border-bottom:2px solid #333;margin-bottom:20px}
  .print-header h1{font-size:18px;color:#000}
  .print-header p{font-size:11px;color:#666}
}
.print-header{display:none}

@media(max-width:768px){
  .header h1{font-size:18px}
  .header{padding:12px 16px}
  .search-wrap{padding:12px 16px}
  .search-box input{font-size:14px;padding:10px 14px 10px 38px}
  .main{padding:12px}
  table{font-size:12px}
  th:first-child{min-width:150px;position:sticky;left:0;z-index:2;background:#f8f9fa}

  .subcat-row td{position:static!important}
  .val{min-width:unset}
  .dept-header{font-size:14px;padding:10px 14px}
  .cat-title{font-size:12.5px;padding:8px 14px}
  .filters button{padding:5px 10px;font-size:11.5px}
}
@media(max-width:480px){
  th:first-child{min-width:120px}
  table{font-size:11px}
  th,td{padding:5px 6px}
}

const CHO = ['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
function getChoSeong(str) {
  let r = '';
  for (let i = 0; i < str.length; i++) {
    const c = str.charCodeAt(i);
    if (c >= 0xAC00 && c <= 0xD7A3) {
      r += CHO[Math.floor((c - 0xAC00) / 588)];
    }
  }
  return r;
}
function isChoSeong(str) {
  return /^[ㄱ-ㅎ]+$/.test(str);
}

// ---- 데이터 평탄화 ----
let flatItems = [];
function flattenData() {
  flatItems = [];
  DATA.departments.forEach(dept => {
    dept.categories.forEach(cat => {
      const processItems = (items, subName) => {
        items.forEach(item => {
          const searchStr = [
            item.name || '',
            item.code || '',
            (item.sites || []).join(' '),
            cat.category || '',
            subName || '',
            dept.name || ''
          ].join(' ').toLowerCase();
          flatItems.push({
            ...item,
            deptId: dept.id,
            deptName: dept.name,
            deptHanja: dept.name_hanja || '',
            deptNote: dept.note || null,
            deptColumns: dept.columns,
            category: cat.category,
            subcategory: subName,
            _search: searchStr,
            _cho: getChoSeong(searchStr)
          });
        });
      };
      if (cat.items) processItems(cat.items, null);
      if (cat.subcategories) {
        cat.subcategories.forEach(sub => {
          if (sub.items) processItems(sub.items, sub.name);
        });
      }
    });
  });
}

// ---- 검색 & 필터 ----
let currentDept = 0; // 0 = 전체
let currentQuery = '';

function search(query, deptFilter) {
  let results = flatItems;
  if (deptFilter > 0) results = results.filter(it => it.deptId === deptFilter);

  if (query.trim()) {
    const tokens = query.trim().toLowerCase().split(/\s+/);
    results = results.filter(item => {
      return tokens.every(tok => {
        if (isChoSeong(tok)) return item._cho.includes(tok);
        return item._search.includes(tok);
      });
    });
  }
  return results;
}

// ---- 렌더링 ----
const colClassMap = {'경도':'val-mild','중등도':'val-mod','고도':'val-sev','종결':'val-end','치료종결':'val-end','재취업':'val-work','치료기간':'val-end','입원기간':'val-work','고정':'val-mild','고정사항':'val-mild'};

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function highlightText(text, tokens) {
  if (!tokens.length || !text) return escapeHtml(text || '');
  let html = escapeHtml(text);
  tokens.forEach(tok => {
    if (isChoSeong(tok)) return;
    if (!tok) return;
    const escaped = tok.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + escaped + ')', 'gi');
    html = html.replace(re, '<mark>$1</mark>');
  });
  return html;
}

function renderVal(v) {
  if (v === null || v === undefined) return '<span class="val val-na">-</span>';
  return '<span class="val">' + escapeHtml(String(v)) + '</span>';
}

function render(results) {
  const container = document.getElementById('results');
  const tokens = currentQuery.trim().toLowerCase().split(/\s+/).filter(Boolean);

  if (!results.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">&#128270;</div><p>검색 결과가 없습니다.<br>다른 검색어를 입력해 주세요.</p></div>';
    return;
  }

  // Group: deptId > category > subcategory
  const groups = {};
  results.forEach(item => {
    const dk = item.deptId;
    if (!groups[dk]) groups[dk] = { dept: item, cats: {} };
    const ck = item.category;
    if (!groups[dk].cats[ck]) groups[dk].cats[ck] = { subs: {} };
    const sk = item.subcategory || '__none__';
    if (!groups[dk].cats[ck].subs[sk]) groups[dk].cats[ck].subs[sk] = [];
    groups[dk].cats[ck].subs[sk].push(item);
  });

  let html = '';
  Object.keys(groups).sort((a,b) => a - b).forEach(dk => {
    const g = groups[dk];
    const dept = g.dept;
    const cols = dept.deptColumns;

    const deptId = 'dept-' + dk;
    const isSearching = currentQuery.trim().length > 0;
    const deptCollapsed = !isSearching ? ' collapsed' : '';
    html += '<div class="dept-section">';
    html += '<div class="dept-header' + deptCollapsed + '" onclick="toggleDept(\'' + deptId + '\',this)">' + escapeHtml(dept.deptName) + ' <span class="hanja">' + escapeHtml(dept.deptHanja) + '</span><span class="unit-badge">단위: 주</span><span class="toggle">&#9660;</span></div>';
    html += '<div class="dept-body' + deptCollapsed + '" id="' + deptId + '">';
    if (dept.deptNote) html += '<div class="dept-note">' + escapeHtml(dept.deptNote) + '</div>';

    Object.keys(g.cats).forEach(ck => {
      const cat = g.cats[ck];
      const catId = deptId + '-cat-' + Object.keys(g.cats).indexOf(ck);
      const catCollapsed = !isSearching ? ' collapsed' : '';
      html += '<div class="cat-card">';
      html += '<div class="cat-title' + catCollapsed + '" onclick="toggleCat(\'' + catId + '\',this)">' + highlightText(ck, tokens) + '<span class="toggle">&#9660;</span></div>';
      html += '<div class="cat-body' + catCollapsed + '" id="' + catId + '">';

      const colCount = 2 + cols.length;
      html += '<div class="table-wrap"><table><thead><tr><th>상병명</th><th>코드</th>';
      cols.forEach(c => html += '<th>' + escapeHtml(c) + '</th>');
      html += '</tr></thead><tbody>';

      Object.keys(cat.subs).forEach(sk => {
        if (sk !== '__none__') {
          html += '<tr class="subcat-row"><td colspan="' + colCount + '">' + highlightText(sk, tokens) + '</td></tr>';
        }
        cat.subs[sk].forEach(item => {
          html += '<tr><td>';
          html += highlightText(item.name, tokens);
          if (item.sites && item.sites.length) {
            html += '<div class="sites">';
            item.sites.forEach(s => html += '<span class="site-tag">' + highlightText(s, tokens) + '</span>');
            html += '</div>';
          }
          html += '</td>';
          html += '<td>' + highlightText(item.code, tokens) + '</td>';
          cols.forEach(c => {
            const v = item[c];
            const cls = colClassMap[c] || '';
            html += '<td class="' + cls + '">' + renderVal(v) + '</td>';
          });
          html += '</tr>';
        });
      });

      html += '</tbody></table></div>';
      html += '</div>'; // cat-body
      html += '</div>'; // cat-card
    });
    html += '</div>'; // dept-body
    html += '</div>'; // dept-section
  });

  container.innerHTML = html;
}

// ---- 필터 버튼 ----
function buildFilters() {
  const wrap = document.getElementById('filterBtns');
  const depts = [{id:0, name:'전체'}];
  DATA.departments.forEach(d => depts.push({id: d.id, name: d.name}));

  wrap.innerHTML = depts.map(d => {
    const cls = d.id === currentDept ? ' active' : '';
    return '<button data-dept="' + d.id + '" class="' + cls + '">' + escapeHtml(d.name) + '<span class="cnt" data-cnt="' + d.id + '"></span></button>';
  }).join('');

  wrap.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      currentDept = parseInt(btn.dataset.dept);
      wrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      runSearch();
    });
  });
}

function updateCounts(results) {
  const counts = {};
  results.forEach(r => { counts[r.deptId] = (counts[r.deptId] || 0) + 1; });
  const total = results.length;
  document.getElementById('resultCount').innerHTML = '검색결과 <span>' + total + '</span>건';

  document.querySelectorAll('.cnt').forEach(el => {
    const id = parseInt(el.dataset.cnt);
    if (id === 0) {
      el.textContent = '(' + total + ')';
    } else {
      el.textContent = counts[id] ? '(' + counts[id] + ')' : '';
    }
  });
}

// ---- 접기/펼치기 ----
function toggleDept(id, header) {
  const body = document.getElementById(id);
  header.classList.toggle('collapsed');
  body.classList.toggle('collapsed');
}
function toggleCat(id, titleEl) {
  const body = document.getElementById(id);
  titleEl.classList.toggle('collapsed');
  body.classList.toggle('collapsed');
}

// ---- 실행 ----
function runSearch() {
  currentQuery = document.getElementById('searchInput').value;
  const clearBtn = document.getElementById('clearBtn');
  clearBtn.style.display = currentQuery ? 'block' : 'none';

  // For counts, search across all depts
  const allResults = search(currentQuery, 0);
  const filteredResults = currentDept > 0 ? allResults.filter(r => r.deptId === currentDept) : allResults;

  updateCounts(allResults);
  render(filteredResults);
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  currentQuery = '';
  runSearch();
  document.getElementById('searchInput').focus();
}

let debounceTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(runSearch, 120);
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') clearSearch();
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ---- 초기화 ----
flattenData();
buildFilters();
runSearch();
document.getElementById('searchInput').focus();
</script>
</body>
</html>
